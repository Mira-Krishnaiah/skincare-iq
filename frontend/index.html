<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkincareIQ</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>SkincareIQ</h1>
      <p>Your AI-powered skincare advisor</p>
    </header>

    <main>
      <section id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
          <textarea id="user-input" placeholder="Ask about your skincare routine, ingredients, or concerns..." rows="3"></textarea>
          <button id="send-btn">Send</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
